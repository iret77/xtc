name: ci

on:
  push:
    branches: [main]
  pull_request:

# The MCP server and its unit tests live in iret77/climbx-mcp, which runs its
# own CI. This repo holds only the Cowork plugin, so CI validates the plugin:
# manifest structure, the .mcp.json wiring and userConfig coupling, the pinned
# server ref, the dashboard artifact, and that the plugin bundles.
jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate plugin (manifests, mcp wiring, dashboard)
        run: node script/check-plugin.mjs
      - name: Plugin bundles
        run: ./script/build-plugin
